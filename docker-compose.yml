services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend